<body class="haikei">
    <div class="container">
        <h1>🌐 ほんやく</h1>
        <p class="subtitle">かんたんに翻訳できるよ！</p>

        <div class="unsupported-message" id="unsupportedMessage">
            ⚠️ お使いのブラウザは音声機能に対応していません。テキストでの翻訳をご利用ください。
        </div>

        <div class="character-container">
            <div class="character-box" id="characterBox">
                <img id="characterImage" class="character-image" src="リーボン１２.png" alt="くまキャラクター">
                <div class="character-mouth-overlay" id="characterMouthOverlay"></div>
                <div class="speech-bubble" id="speechBubble"></div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="language-selector">
            <div class="language-group">
                <label for="fromLang">翻訳元言語</label>
                <select id="fromLang">
                    <option value="ja">日本語</option>
                    <option value="en">英語</option>
                    <option value="zh">中国語</option>
                    <option value="ko">韓国語</option>
                </select>
            </div>
            <button class="swap-button" id="swapBtn" title="言語を交換">⇄</button>
            <div class="language-group">
                <label for="toLang">翻訳先言語</label>
                <select id="toLang">
                    <option value="en">英語</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中国語</option>
                    <option value="ko">韓国語</option>
                </select>
            </div>
        </div>

        <div class="text-group input">
            <div class="text-header">
                <label for="inputText">翻訳したいテキスト</label>
                <span class="char-count"><span id="charCount">0</span>/1000文字</span>
            </div>
            <textarea id="inputText" placeholder="ここにテキストを入力してください..." maxlength="1000"></textarea>
            <div class="input-actions">
                <button id="voiceInputBtn" class="voice-button" title="マイクで入力">🎤 音声入力</button>
            </div>
        </div>

        <div class="button-group">
            <button id="translateBtn">翻訳する</button>
            <button id="copyBtn">📋 結果をコピー</button>
        </div>

        <div class="text-group">
            <label for="outputText">翻訳結果</label>
            <textarea id="outputText" placeholder="翻訳結果がここに表示されます" readonly></textarea>
            <div class="output-actions">
                <button id="voiceOutputBtn" class="voice-button" title="音声で読み上げ">🔊 音声再生</button>
            </div>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">コピーしました！</div>

    <script>
        // 要素の取得
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const fromLang = document.getElementById('fromLang');
        const toLang = document.getElementById('toLang');
        const translateBtn = document.getElementById('translateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const swapBtn = document.getElementById('swapBtn');
        const messageDiv = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        const copyFeedback = document.getElementById('copyFeedback');
        // 文字数カウント
        inputText.addEventListener('input', function() {
            charCount.textContent = inputText.value.length;
        });

        const languageVoiceProfiles = {
            ja: { rate: 0.85, pitch: 1.45, volume: 1.0 },
            en: { rate: 0.85, pitch: 1.45, volume: 1.0 },
            zh: { rate: 0.85, pitch: 1.45, volume: 1.0 },
            ko: { rate: 0.85, pitch: 1.45, volume: 1.0 }
        };

        function getVoiceProfile(lang) {
            return languageVoiceProfiles[lang] || languageVoiceProfiles.ja;
        }

        function isFemaleVoice(voice) {
            const name = (voice.name || '').toLowerCase();
            const uri = (voice.voiceURI || '').toLowerCase();
            return name.includes('female') || name.includes('woman') || name.includes('girl') || name.includes('女性') || uri.includes('female') || uri.includes('woman') || uri.includes('girl') || uri.includes('女性');
        }

        function getVoiceForLanguage(lang) {
            const normalized = lang.toLowerCase();
            if (normalized === 'zh' || normalized === 'ko') {
                return selectedSpeechVoice || speechVoices[0] || null;
            }

            const femaleMatch = speechVoices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith(normalized) && isFemaleVoice(voice));
            if (femaleMatch) return femaleMatch;

            const langMatch = speechVoices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith(normalized));
            return langMatch || selectedSpeechVoice || speechVoices[0] || null;
        }

        // 言語交換ボタン
        swapBtn.addEventListener('click', function() {
            const temp = fromLang.value;
            fromLang.value = toLang.value;
            toLang.value = temp;
        });

 
        // 翻訳関数
        async function translate() {
            const text = inputText.value.trim();

            if (!text) {
                showMessage('📝 翻訳したいテキストを入力してください', 'error');
                return;
            }

            if (fromLang.value === toLang.value) {
                showMessage('⚠️ 翻訳元と翻訳先の言語が同じです', 'error');
                return;
            }

            // UI状態の変更
            translateBtn.disabled = true;
            const originalText = translateBtn.textContent;
            translateBtn.innerHTML = '<span class="loading"></span>';
            messageDiv.className = 'message';
            outputText.value = '';

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang.value}|${toLang.value}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    outputText.value = data.responseData.translatedText;
                    showMessage('✅ 翻訳完了しました', 'success');
                } else if (data.responseStatus === 429) {
                    showMessage('⏱️ リクエストが多すぎます。少し待ってからもう一度試してください', 'error');
                } else {
                    showMessage('❌ 翻訳に失敗しました。もう一度試してください', 'error');
                }
            } catch (error) {
                showMessage('❌ エラーが発生しました: ' + error.message, 'error');
            } finally {
                translateBtn.disabled = false;
                translateBtn.textContent = originalText;
            }
        }

        // 翻訳ボタンのクリックイベント
        translateBtn.addEventListener('click', translate);

        // Enterキーで翻訳
        inputText.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                translate();
            }
        });

        // コピーボタンの機能
        copyBtn.addEventListener('click', function() {
            if (!outputText.value) {
                showMessage('📋 コピーする内容がありません', 'error');
                return;
            }

            outputText.select();
            document.execCommand('copy');

            copyFeedback.classList.add('show');
            setTimeout(() => {
                copyFeedback.classList.remove('show');
            }, 2000);
        });

        // 音声API チェック
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SpeechSynthesis = window.speechSynthesis;
        const voiceInputBtn = document.getElementById('voiceInputBtn');
        const voiceOutputBtn = document.getElementById('voiceOutputBtn');
        const unsupportedMessage = document.getElementById('unsupportedMessage');

        let isRecording = false;
        let speechVoices = [];
        let selectedSpeechVoice = null;

        function loadSpeechVoices() {
            speechVoices = speechSynthesis.getVoices();
            if (!selectedSpeechVoice) {
                selectedSpeechVoice = selectPreferredFemaleVoice();
            }
        }

        function selectPreferredFemaleVoice() {
            const preferred = speechVoices.find(voice => {
                const name = (voice.name || '').toLowerCase();
                const uri = (voice.voiceURI || '').toLowerCase();
                const female = name.includes('female') || name.includes('woman') || name.includes('girl') || name.includes('女性');
                const adult = !name.includes('child') && !name.includes('kid') && !name.includes('baby') && !name.includes('young') && !name.includes('little') && !name.includes('junior');
                return female && adult;
            });
            if (preferred) return preferred;
            const anyFemale = speechVoices.find(voice => {
                const name = (voice.name || '').toLowerCase();
                return name.includes('female') || name.includes('woman') || name.includes('girl') || name.includes('女性');
            });
            return anyFemale || speechVoices[0] || null;
        }

        speechSynthesis.onvoiceschanged = loadSpeechVoices;
        loadSpeechVoices();

        // 音声機能のサポート確認
        if (!SpeechRecognition || !SpeechSynthesis) {
            voiceInputBtn.disabled = true;
            voiceOutputBtn.disabled = true;
            unsupportedMessage.style.display = 'block';
        }

        // 音声入力機能
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            
            // 言語設定の対応
            const langMap = {
                'ja': 'ja-JP',
                'en': 'en-US',
                'zh': 'zh-CN',
                'ko': 'ko-KR'
            };

            recognition.continuous = false;
            recognition.interimResults = true;

            voiceInputBtn.addEventListener('click', function() {
                if (isRecording) {
                    recognition.stop();
                    return;
                }

                isRecording = true;
                recognition.lang = langMap[fromLang.value] || 'ja-JP';
                voiceInputBtn.classList.add('recording');
                voiceInputBtn.textContent = '🎤 聞取中...';
                inputText.focus();
                recognition.start();
            });

            recognition.onstart = function() {
                isRecording = true;
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    inputText.value += finalTranscript;
                    charCount.textContent = inputText.value.length;
                } else if (interimTranscript) {
                    voiceInputBtn.textContent = '🎤 ' + interimTranscript.substring(0, 10) + '...';
                }
            };

            recognition.onerror = function(event) {
                const errorMessages = {
                    'no-speech': '音声が認識されませんでした。もう一度試してください。',
                    'network': 'ネットワークエラーが発生しました。',
                    'not-allowed': 'マイクへのアクセスが拒否されました。'
                };
                const message = errorMessages[event.error] || 'エラーが発生しました: ' + event.error;
                showMessage('❌ ' + message, 'error');
            };

            recognition.onend = function() {
                isRecording = false;
                voiceInputBtn.classList.remove('recording');
                voiceInputBtn.textContent = '🎤 音声入力';
            };
        }

        // 音声出力機能
        if (SpeechSynthesis) {
            voiceOutputBtn.addEventListener('click', function() {
                const text = outputText.value.trim();

                if (!text) {
                    showMessage('🔊 再生する内容がありません', 'error');
                    return;
                }

                // 再生中の場合は停止
                if (SpeechSynthesis.speaking) {
                    SpeechSynthesis.cancel();
                    voiceOutputBtn.textContent = '🔊 音声再生';
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(text);

                const langMap = {
                    'ja': 'ja-JP',
                    'en': 'en-US',
                    'zh': 'zh-CN',
                    'ko': 'ko-KR'
                };

                utterance.lang = langMap[toLang.value] || 'ja-JP';
                utterance.voice = getVoiceForLanguage(toLang.value) || selectedSpeechVoice || speechVoices[0];

                const profile = getVoiceProfile(toLang.value);
                utterance.rate = profile.rate;
                utterance.pitch = profile.pitch;
                utterance.volume = profile.volume;

                utterance.onstart = function() {
                    voiceOutputBtn.textContent = '⏸️ 停止';
                    voiceOutputBtn.style.backgroundColor = '#ff9800';
                    voiceOutputBtn.style.borderColor = '#ff9800';
                };

                utterance.onend = function() {
                    voiceOutputBtn.textContent = '🔊 音声再生';
                    voiceOutputBtn.style.backgroundColor = '#f0f0f0';
                    voiceOutputBtn.style.borderColor = '#e0e0e0';
                    voiceOutputBtn.style.color = '#333';
                };

                utterance.onerror = function(event) {
                    showMessage('❌ 音声再生エラー: ' + event.error, 'error');
                    voiceOutputBtn.textContent = '🔊 音声再生';
                    voiceOutputBtn.style.backgroundColor = '#f0f0f0';
                    voiceOutputBtn.style.borderColor = '#e0e0e0';
                    voiceOutputBtn.style.color = '#333';
                };

                SpeechSynthesis.speak(utterance);
            });
        }
    </script>
